<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>TODOS</h1>
        <button id="logout-btn">Logout</button>
      </header>

      <div id="status"></div>

      <form class="input-row" id="todo-form">
        <input
          type="text"
          id="todo-input"
          placeholder="what needs to be done?"
          autocomplete="off"
        />
        <button type="submit" class="add-btn" id="add-btn">+ ADD</button>
      </form>

      <p class="section-label">Tasks</p>
      <ul id="todo-list"></ul>
      <div id="empty-state">no todos yet. add one above.</div>

      <div id="log">
        <p class="section-label" style="margin-bottom: 12px">
          Network Requests
        </p>
        <ul id="log-list"></ul>
      </div>
    </div>

    <script type="module" src="../js/script.js"></script>
  </body>
</html>
